name: wheels

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build sdist
        run: uv build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [build_sdist]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_TEST_SKIP: "*"
          CIBW_SKIP: "pp* cp3*t-*"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 1

  build_manylinux_wheels_ubuntu:
    name: Build manylinux wheels on ubuntu-latest
    runs-on: ubuntu-latest
    needs: [build_sdist]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_TEST_SKIP: "*"
          CIBW_SKIP: "pp* cp3*t-* *-musllinux*"

      - uses: actions/upload-artifact@v4
        with:
          name: manylinux
          path: ./wheelhouse/*.whl
          retention-days: 1

  publish:
    if: github.event_name == 'release'
    name: Publish to PyPI
    needs: [build_sdist, build_wheels, build_manylinux_wheels_ubuntu]
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
